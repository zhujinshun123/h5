<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你喜欢我吗</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(270deg, #ff9a9e, #fad0c4);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    h1 {
      margin-top: 120px;
      color: white;
      font-size: 32px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 20px;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
    }

    #noBtn {
      position: absolute;
      background: #666;
      color: white;
    }

    /* 全屏表白层 */
    #loveScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ff4d6d, #ff758c, #ff9a9e);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      z-index: 999;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(1.2);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .bigText {
      font-size: 48px;
      animation: zoom 1.5s infinite alternate;
    }

    @keyframes zoom {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.2);
      }
    }

    /* 爱心雨 */
    .heart {
      position: absolute;
      color: white;
      font-size: 20px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      from {
        transform: translateY(-50px);
        opacity: 1;
      }

      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>你喜欢朱金顺吗？❤️</h1>

  <button id="yesBtn">喜欢 😏</button>
  <button id="noBtn">不喜欢</button>

  <!-- 表白全屏 -->
  <div id="loveScreen">
    <div class="bigText">我也喜欢你 ❤️</div>
    <div style="margin-top:20px;font-size:20px;">在一起吧 💍</div>
  </div>

  <!-- BGM -->
  <audio id="bgm" loop>
    <source src="https://zhujinshun123.github.io/h5/iloveyou.mp3" type="audio/mpeg">
  </audio>

  <script>
    let noBtn = document.getElementById("noBtn");
    let yesBtn = document.getElementById("yesBtn");
    let loveScreen = document.getElementById("loveScreen");
    let bgm = document.getElementById("bgm");

    // 不喜欢按钮逃跑
    function moveBtn() {
      let maxX = window.innerWidth - noBtn.offsetWidth;
      let maxY = window.innerHeight - noBtn.offsetHeight;

      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";
    }

    noBtn.addEventListener("mouseover", () => {
      bgm.play().catch(() => { });
      moveBtn();
    });
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      bgm.play().catch(() => { });
      moveBtn();
    });

    // 喜欢按钮点击
    yesBtn.onclick = function () {

      bgm.play().catch(() => { });
      // 显示全屏表白
      loveScreen.style.display = "flex";

      // 爱心雨
      for (let i = 0; i < 50; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (2 + Math.random() * 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
      }

      // 3秒后跳转（可改）
      // setTimeout(() => {
      //   window.location.href = "https://www.baidu.com";
      // }, 3000);
    };
  </script>

</body>

</html>
